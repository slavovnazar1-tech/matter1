<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matter — Product</title>
<link rel="stylesheet" href="shop.css">
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">Matter<span>.</span></a>
  <div class="nav"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
  <a href="cart.html" class="cart-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Cart <span class="badge" id="cartBadge">0</span>
  </a>
</div>

<div class="pages">
<div class="page active">

<div class="prod-page" id="prodPage">
  <div class="gallery" id="prodGallery">
    <img src="" alt="" class="active">
  </div>
  <div class="info">
    <a href="shop.html" class="back-link">&larr; Back to Shop</a>
    <h1 id="pName"></h1>
    <div class="sub" id="pSub"></div>
    <div class="price" id="pPrice"></div>
    <div class="desc" id="pDesc"></div>
    <div class="specs" id="pSpecs"></div>
    <div class="qty-row">
      <div class="qty-box">
        <button onclick="qtyAdj(-1)">&minus;</button>
        <input type="text" id="pQty" value="1" readonly>
        <button onclick="qtyAdj(1)">+</button>
      </div>
      <button class="btn btn-sm" onclick="addFromProduct()">Add to Cart</button>
    </div>
  </div>
</div>

</div></div>

<footer>&copy; 2026 Matter. Design for living.</footer>

<script src="shop-data.js"></script>
<script>
var id = parseInt(new URLSearchParams(window.location.search).get('id'));
var p = null;
for(var i=0;i<products.length;i++){ if(products[i].id === id){ p = products[i]; break; } }

if(p){
  document.title = p.name + ' — Matter';
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pSub').textContent = p.desc;
  document.getElementById('pPrice').textContent = '$'+p.price;
  document.getElementById('pDesc').textContent = p.full;
  document.getElementById('pSpecs').innerHTML = '<strong>Specifications</strong><br>'+p.specs;
  document.querySelector('#prodGallery img').src = 'https://picsum.photos/seed/matter-'+p.seed+'/800/900';
  document.querySelector('#prodGallery img').alt = p.name;
  requestAnimationFrame(function(){
    document.getElementById('prodPage').classList.add('visible');
  });
}
updateBadge();

function qtyAdj(d){
  var el = document.getElementById('pQty');
  var v = parseInt(el.value) + d;
  if(v >= 1 && v <= 99) el.value = v;
}

function addFromProduct(){
  var qty = parseInt(document.getElementById('pQty').value);
  for(var i=0;i<qty;i++) addToCart(id);
}
</script>
</body>
</html>
