<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matter — Cart</title>
<link rel="stylesheet" href="shop.css">
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">Matter<span>.</span></a>
  <div class="nav"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
  <a href="cart.html" class="cart-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Cart <span class="badge" id="cartBadge">0</span>
  </a>
</div>

<div class="pages">
<div class="page active">

<div class="cart-page">
  <h1>Shopping Cart</h1>
  <div class="cart-empty" id="cartEmpty">
    <p>Your cart is empty.</p>
    <a href="shop.html" class="btn">Continue Shopping</a>
  </div>
  <div id="cartContent" style="display:none">
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-summary">
      <div class="row"><span>Subtotal</span><span id="cartSubtotal">$0</span></div>
      <div class="row"><span>Shipping</span><span id="cartShipping">Free</span></div>
      <div class="row total"><span>Total</span><span id="cartTotal">$0</span></div>
      <a href="checkout.html" class="btn">Proceed to Checkout</a>
    </div>
  </div>
</div>

</div></div>

<footer>&copy; 2026 Matter. Design for living.</footer>

<script src="shop-data.js"></script>
<script>
renderCartItems();
updateBadge();
</script>
</body>
</html>
