<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matter — Checkout</title>
<link rel="stylesheet" href="shop.css">
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">Matter<span>.</span></a>
  <div class="nav"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
  <a href="cart.html" class="cart-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Cart <span class="badge" id="cartBadge">0</span>
  </a>
</div>

<div class="pages">
<div class="page active">

<div class="checkout-page" id="checkoutPageContent">
  <h1>Checkout</h1>
  <div class="checkout-grid">
    <div class="checkout-form" id="checkoutForm">
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="cfName" placeholder="Alex"></div>
        <div class="form-group"><label>Last Name</label><input type="text" id="clName" placeholder="Lane"></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="cEmail" placeholder="alex@example.com"></div>
      <div class="form-group"><label>Address</label><input type="text" id="cAddr" placeholder="123 Main Street"></div>
      <div class="form-row">
        <div class="form-group"><label>City</label><input type="text" id="cCity" placeholder="New York"></div>
        <div class="form-group"><label>ZIP</label><input type="text" id="cZip" placeholder="10001"></div>
      </div>
      <div class="form-group"><label>Card Number</label><input type="text" id="cCard" placeholder="4242 4242 4242 4242"></div>
      <div class="form-row">
        <div class="form-group"><label>Expiry</label><input type="text" id="cExp" placeholder="12/28"></div>
        <div class="form-group"><label>CVC</label><input type="text" id="cCvc" placeholder="123"></div>
      </div>
      <button class="btn" onclick="placeOrder()" style="width:100%;margin-top:8px">Place Order</button>
      <div class="msg" id="orderMsg"></div>
    </div>
    <div class="checkout-summary" id="checkoutSummary">
      <h3>Order Summary</h3>
      <div id="checkoutItems"></div>
      <div class="cs-total"><span>Total</span><span id="checkoutTotal">$0</span></div>
    </div>
  </div>
  <div id="orderConfirm" style="display:none;text-align:center;padding:60px 0">
    <div style="width:64px;height:64px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#065f46">&#10003;</div>
    <h2 style="font-size:26px;font-weight:500;margin-bottom:6px">Order Confirmed</h2>
    <p style="color:#b07c4b;font-size:14px;margin-bottom:4px" id="orderNum">#M-2026-0000</p>
    <p style="color:#888;font-size:14px;margin-bottom:24px">Thanks! We'll send a confirmation to your email.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</div>

</div></div>

<footer>&copy; 2026 Matter. Design for living.</footer>

<script src="shop-data.js"></script>
<script>
var cart = getCart();
var hasItems = false;
for(var k in cart) if(cart.hasOwnProperty(k)){ hasItems = true; break; }

/* redirect to cart if empty */
if(!hasItems){
  window.location.href = 'cart.html';
}

/* render checkout summary */
var sub = 0;
var html = '';
for(var key in cart){
  if(!cart.hasOwnProperty(key)) continue;
  var id = Number(key);
  var p = null;
  for(var pi=0;pi<products.length;pi++){ if(products[pi].id === id){ p = products[pi]; break; } }
  if(!p) continue;
  var q = cart[key];
  sub += p.price * q;
  html += '<div class="cs-item"><span>'+p.name+' x'+q+'</span><span>$'+(p.price*q)+'</span></div>';
}
document.getElementById('checkoutItems').innerHTML = html;
document.getElementById('checkoutTotal').textContent = '$'+sub;
updateBadge();

function placeOrder(){
  var name = document.getElementById('cfName').value.trim();
  var email = document.getElementById('cEmail').value.trim();
  if(!name || !email){
    var msg = document.getElementById('orderMsg');
    msg.textContent = 'Please fill in your name and email.';
    msg.className = 'msg show err';
    return;
  }
  var num = '#M-2026-' + String(Math.floor(Math.random()*9000)+1000);
  document.getElementById('orderNum').textContent = num;
  document.getElementById('checkoutForm').style.display = 'none';
  document.getElementById('checkoutSummary').style.display = 'none';
  document.getElementById('orderConfirm').style.display = 'block';
  clearCart();
  updateBadge();
}
</script>
</body>
</html>
