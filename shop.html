<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matter — Shop</title>
<link rel="stylesheet" href="shop.css">
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">Matter<span>.</span></a>
  <div class="nav"><a href="index.html">Home</a><a href="shop.html" class="active">Shop</a></div>
  <a href="cart.html" class="cart-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Cart <span class="badge" id="cartBadge">0</span>
  </a>
</div>

<div class="pages">
<div class="page active">

<div class="shop-header">
  <h1>All Products</h1>
  <p style="color:#888;font-size:14px;margin-top:4px">Hand-picked design for your home.</p>
</div>
<div class="shop-filters visible" id="shopFilters">
  <button class="f active" data-cat="all">All</button>
  <button class="f" data-cat="furniture">Furniture</button>
  <button class="f" data-cat="lighting">Lighting</button>
  <button class="f" data-cat="objects">Objects</button>
</div>
<div class="prod-grid" id="shopGrid"></div>

</div></div>

<footer>&copy; 2026 Matter. Design for living.</footer>

<script src="shop-data.js"></script>
<script>
var params = new URLSearchParams(window.location.search);
var initialCat = params.get('cat') || 'all';

function renderShop(cat){
  var items = cat==='all' ? products : products.filter(function(p){return p.cat===cat});
  renderProductGrid('shopGrid', items);
}

document.querySelectorAll('.shop-filters .f').forEach(function(b){
  if(b.dataset.cat===initialCat){ b.classList.add('active'); } else { b.classList.remove('active'); }
});

document.getElementById('shopFilters').addEventListener('click',function(e){
  if(e.target.classList.contains('f')){
    document.querySelectorAll('.shop-filters .f').forEach(function(b){b.classList.remove('active')});
    e.target.classList.add('active');
    renderShop(e.target.dataset.cat);
  }
});

renderShop(initialCat);
updateBadge();
</script>
</body>
</html>
